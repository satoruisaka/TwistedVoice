<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TwistedVoice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0f0f13;
      color: #e0e0e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* dynamic viewport height — accounts for mobile browser chrome */
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a38;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.06em;
    }
    #health-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #4ade80;
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #health-dot.offline { background: #f87171; }

    /* ── Agent selector ──────────────────────────────────────────────────── */
    #agent-bar {
      padding: 10px 16px;
      background: #141420;
      border-bottom: 1px solid #2a2a38;
      flex-shrink: 0;
    }
    #agent-select {
      width: 100%;
      background: #1e1e2e;
      color: #e0e0e8;
      border: 1px solid #3a3a50;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.95rem;
      appearance: none;
      cursor: pointer;
      outline: none;
    }
    #agent-select:focus { border-color: #6d5ce4; }

    /* ── Conversation ────────────────────────────────────────────────────── */
    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.95rem;
      word-break: break-word;
    }
    .bubble.user {
      background: #312e81;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      color: #ede9fe;
    }
    .bubble.agent {
      background: #1b1f35;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      color: #c7d2fe;
      border: 1px solid #2a2a50;
    }
    .bubble .label {
      font-size: 0.68rem;
      opacity: 0.55;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    #status-bar {
      padding: 7px 16px;
      background: #141420;
      text-align: center;
      font-size: 0.82rem;
      color: #666;
      min-height: 34px;
      flex-shrink: 0;
      border-top: 1px solid #2a2a38;
      transition: color 0.2s;
    }
    #status-bar.listening { color: #4ade80; }
    #status-bar.thinking  { color: #fbbf24; }
    #status-bar.speaking  { color: #a78bfa; }
    #status-bar.error     { color: #f87171; }

    /* ── Mic button ──────────────────────────────────────────────────────── */
    #controls {
      padding: 14px 16px 20px;
      background: #0f0f13;
      flex-shrink: 0;
      display: flex;
      gap: 10px;
    }
    #mic-btn {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      background: #4f46e5;
      color: #fff;
      letter-spacing: 0.02em;
      transition: background 0.12s, transform 0.1s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: none;
      box-shadow: 0 4px 20px rgba(79,70,229,0.35);
    }
    #mic-btn.recording {
      background: #dc2626;
      box-shadow: 0 4px 24px rgba(220,38,38,0.45);
      transform: scale(0.97);
    }
    #mic-btn:disabled {
      background: #2d2d3a;
      color: #555;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #new-chat-btn {
      padding: 18px 16px;
      border: 1px solid #3a3a50;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #1e1e2e;
      color: #a78bfa;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }
    #new-chat-btn:hover { background: #2a2a3e; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1>TwistedVoice</h1>
    <span id="health-dot" class="offline" title="Checking server..."></span>
  </header>

  <div id="agent-bar">
    <select id="agent-select"><option value="">Loading agents…</option></select>
  </div>

  <div id="conversation"></div>

  <div id="status-bar">Ready</div>

  <div id="controls">
    <button id="mic-btn" disabled>🎤 Hold to Talk</button>
    <button id="new-chat-btn" title="Start a new conversation">＋ New</button>
  </div>
</div>

<script>
'use strict';

const API = '';           // same origin — server and UI on same port
const CONVO = document.getElementById('conversation');
const MIC_BTN = document.getElementById('mic-btn');
const NEW_BTN = document.getElementById('new-chat-btn');
const AGENT_SEL = document.getElementById('agent-select');
const STATUS = document.getElementById('status-bar');
const HEALTH_DOT = document.getElementById('health-dot');

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let currentAudio = null;   // HTMLAudioElement for server TTS playback
let agentConfigs = {};      // name → {voice_lang, ...}
let sessionId = crypto.randomUUID();  // stable for this page load; reset on New Chat

// ── Initialisation ────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadAgents(), checkHealth()]);
  await requestMicPermission();
}

async function checkHealth() {
  try {
    const r = await fetch(`${API}/api/health`);
    const d = await r.json();
    HEALTH_DOT.className = d.ollama === 'online' ? '' : 'offline';
    HEALTH_DOT.title = `Ollama: ${d.ollama} | Agents: ${d.agents}`;
  } catch {
    HEALTH_DOT.className = 'offline';
    HEALTH_DOT.title = 'Server unreachable';
  }
}

async function loadAgents() {
  try {
    const r = await fetch(`${API}/api/agents`);
    const d = await r.json();
    agentConfigs = {};
    d.agents.forEach(a => { agentConfigs[a.name] = a; });
    AGENT_SEL.innerHTML = d.agents.map(a =>
      `<option value="${a.name}">${a.name}${a.rag_enabled ? ' 🔍' : ''} — ${a.description}</option>`
    ).join('');
  } catch (e) {
    setStatus('Failed to load agents — is the server running?', 'error');
  }
}

async function requestMicPermission() {
  try {
    await navigator.mediaDevices.getUserMedia({ audio: true });
    MIC_BTN.disabled = false;
    setStatus('Ready');
  } catch {
    setStatus('Microphone access denied', 'error');
    MIC_BTN.disabled = true;
  }
}

// ── Status helper ─────────────────────────────────────────────────────────────
function setStatus(text, type = '') {
  STATUS.textContent = text;
  STATUS.className = type;
}

// ── Conversation bubbles ──────────────────────────────────────────────────────
function addBubble(role, text, label = '') {
  const div = document.createElement('div');
  div.className = `bubble ${role}`;
  if (label) {
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = label;
    div.appendChild(lbl);
  }
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  CONVO.appendChild(div);
  CONVO.scrollTop = CONVO.scrollHeight;
}

// ── New Chat ──────────────────────────────────────────────────────────────────
NEW_BTN.addEventListener('click', () => {
  stopAudio();
  sessionId = crypto.randomUUID();
  CONVO.innerHTML = '';
  setStatus('New conversation started');
});

// ── Push-to-talk ──────────────────────────────────────────────────────────────
MIC_BTN.addEventListener('pointerdown', e => { e.preventDefault(); startRecording(); });
MIC_BTN.addEventListener('pointerup',   e => { e.preventDefault(); stopRecording(); });
MIC_BTN.addEventListener('pointercancel', stopRecording);

async function startRecording() {
  if (isRecording || MIC_BTN.disabled) return;

  // Cancel any in-progress TTS
  stopAudio();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // Pick the best format this browser supports
    const mimeType = ['audio/webm;codecs=opus', 'audio/ogg;codecs=opus', 'audio/mp4', '']
      .find(t => !t || MediaRecorder.isTypeSupported(t));

    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);

    isRecording = true;
    MIC_BTN.classList.add('recording');
    MIC_BTN.textContent = '🔴 Release to Send';
    setStatus('Listening…', 'listening');
  } catch (e) {
    setStatus('Mic error: ' + e.message, 'error');
  }
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;

  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());

  MIC_BTN.classList.remove('recording');
  MIC_BTN.disabled = true;
  MIC_BTN.textContent = '⏳ Processing…';
  setStatus('Transcribing…', 'thinking');

  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    await processAudio(blob);
    MIC_BTN.disabled = false;
    MIC_BTN.textContent = '🎤 Hold to Talk';
  };
}

// ── Core pipeline: audio → transcript → chat → TTS ───────────────────────────
async function processAudio(blob) {
  // 1. Transcribe
  let transcript;
  try {
    const form = new FormData();
    form.append('audio', blob, 'recording');
    const r = await fetch(`${API}/api/transcribe`, { method: 'POST', body: form });
    if (!r.ok) throw new Error(await r.text());
    transcript = (await r.json()).transcript.trim();
  } catch (e) {
    setStatus('Transcription failed: ' + e.message, 'error');
    return;
  }

  if (!transcript) {
    setStatus('No speech detected — try again', 'error');
    return;
  }

  addBubble('user', transcript, 'You');

  // 2. Chat
  setStatus('Thinking…', 'thinking');
  let response, agentName;
  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_name: AGENT_SEL.value, message: transcript, session_id: sessionId }),
    });
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    response = d.response;
    agentName = d.agent_name;
  } catch (e) {
    setStatus('Agent error: ' + e.message, 'error');
    return;
  }

  addBubble('agent', response || '(no response)', agentName);

  // 3. Speak (server TTS — Phase 2)
  setStatus('Speaking…', 'speaking');
  speak(response, agentName, () => setStatus('Ready'));
}

// ── Audio stop helper ──────────────────────────────────────────────────
function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
}

// ── Server TTS (Phase 2) with browser speechSynthesis fallback ────────────────
async function speak(text, agentName, onEnd) {
  stopAudio();
  let objectUrl = null;
  try {
    const r = await fetch(`${API}/api/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, agent_name: agentName }),
    });
    if (!r.ok) throw new Error(`TTS ${r.status}`);
    const blob = await r.blob();
    objectUrl = URL.createObjectURL(blob);
    const audio = new Audio(objectUrl);
    currentAudio = audio;
    audio.onended = () => {
      URL.revokeObjectURL(objectUrl);
      currentAudio = null;
      onEnd?.();
    };
    audio.onerror = () => {
      URL.revokeObjectURL(objectUrl);
      currentAudio = null;
      onEnd?.();
    };
    audio.play();
  } catch (e) {
    // Fallback to browser speechSynthesis if server TTS is unavailable
    if (objectUrl) URL.revokeObjectURL(objectUrl);
    currentAudio = null;
    if (!window.speechSynthesis) { onEnd?.(); return; }
    window.speechSynthesis.cancel();
    const lang = 'en-US';
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = 1.05;
    utt.onend = onEnd;
    utt.onerror = onEnd;
    window.speechSynthesis.speak(utt);
  }
}

// ── Go ────────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
